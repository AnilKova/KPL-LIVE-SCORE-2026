<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#050a0f">
<title>KOS PREMIER LEAGUE 2026 — Live Scoreboard</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════
   BASE RESET & VARIABLES
════════════════════════════════════════ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --neon:#00f5ff; --acid:#aaff00; --gold:#ffcc00; --silver:#b8c8d8;
  --red:#ff4455;  --orange:#ffaa00; --purple:#cc00ff; --pink:#ff00cc;
  --bg:#050a0f;   --panel:#0d1e2e;  --panel2:#091624;
  --border:rgba(0,245,255,.15); --border2:rgba(255,255,255,.05);
  --text:#c8e8ff; --dim:rgba(200,232,255,.72);
  --fm:'Share Tech Mono',monospace; --fd:'Orbitron',sans-serif;
  /* layout */
  --nav-h:52px; --mobnav-h:58px;
}
html{scroll-behavior:smooth;height:100%}
body{background:var(--bg);color:var(--text);font-family:var(--fm);
  min-height:100vh;overflow-x:hidden;line-height:1.4}

/* grid bg */
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:linear-gradient(rgba(0,245,255,.025)1px,transparent 1px),
                   linear-gradient(90deg,rgba(0,245,255,.025)1px,transparent 1px);
  background-size:clamp(24px,4vw,44px) clamp(24px,4vw,44px)}

/* particles */
#pts{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.pt{position:absolute;width:1px;height:1px;background:var(--neon);border-radius:50%;
  animation:pf linear infinite;opacity:0}
@keyframes pf{
  0%{opacity:0;transform:translateY(100vh) translateX(0)}
  10%{opacity:.5} 90%{opacity:.1}
  100%{opacity:0;transform:translateY(-5vh) translateX(15px)}
}

/* ════════════════════════════════════════
   LAYOUT
════════════════════════════════════════ */
.wrap{position:relative;z-index:1;min-height:100vh;display:flex;flex-direction:column}

/* ════════════════════════════════════════
   NAVBAR
════════════════════════════════════════ */
.nav{
  display:flex;align-items:center;justify-content:space-between;
  padding:.5rem 1rem;min-height:var(--nav-h);
  border-bottom:1px solid var(--border);background:rgba(5,10,15,.97);
  position:sticky;top:0;z-index:200;gap:.5rem;
}
.nl{display:flex;align-items:center;gap:.55rem;min-width:0;flex:1}
.nlogo{height:28px;width:auto;flex-shrink:0;object-fit:contain}
.ntitle{
  font-family:var(--fd);font-weight:700;color:var(--neon);letter-spacing:.1em;
  font-size:clamp(.65rem,2.2vw,.95rem);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.nr{display:flex;align-items:center;gap:.4rem;flex-shrink:0}

/* pills */
.pill{display:flex;align-items:center;gap:.3rem;border:1px solid;
  padding:.22rem .55rem;font-size:clamp(.52rem,.8vw,.6rem);letter-spacing:.1em;white-space:nowrap}
.plive{border-color:rgba(0,245,255,.3);color:var(--neon);background:rgba(0,245,255,.06)}
.padmin{border-color:rgba(255,170,0,.4);color:var(--orange);background:rgba(255,170,0,.06);display:none}
.ldot{width:6px;height:6px;border-radius:50%;background:var(--neon);flex-shrink:0;animation:ld 1.2s infinite}
@keyframes ld{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.25;transform:scale(.6)}}
.gchip{background:rgba(0,245,255,.12);border:1px solid rgba(0,245,255,.3);
  color:var(--neon);font-size:.5rem;padding:.08rem .35rem}

/* nav buttons */
.bnav{
  background:transparent;border:1px solid;font-family:var(--fm);
  font-size:clamp(.52rem,.8vw,.6rem);padding:.28rem .65rem;cursor:pointer;
  letter-spacing:.1em;display:flex;align-items:center;gap:.3rem;white-space:nowrap;
  transition:background .2s;
}
.bopen{border-color:rgba(255,170,0,.5);color:var(--orange)}.bopen:hover{background:rgba(255,170,0,.1)}
.bexit{border-color:rgba(255,68,85,.5);color:var(--red);display:none}.bexit:hover{background:rgba(255,68,85,.1)}

/* countdown bar */
.cbar{height:2px;background:linear-gradient(90deg,var(--neon),var(--acid));
  transition:width 1s linear;opacity:.35;width:100%}

/* ════════════════════════════════════════
   HERO
════════════════════════════════════════ */
.hero{text-align:center;padding:clamp(1.2rem,4vw,2.8rem) 1rem clamp(.8rem,2vw,1.2rem)}
.hero-eye{font-size:clamp(.52rem,.8vw,.65rem);letter-spacing:.3em;color:var(--neon);opacity:.6;margin-bottom:.35rem}
.hero-h1{
  font-family:var(--fd);font-weight:900;line-height:1;
  font-size:clamp(1.5rem,5.5vw,3.8rem);
  color:#fff;text-shadow:0 0 50px rgba(0,245,255,.3),0 0 100px rgba(0,245,255,.1);
}
.hero-h1 span{color:var(--neon)}
.hero-meta{
  display:flex;justify-content:center;gap:clamp(.8rem,3vw,2rem);
  margin-top:.6rem;font-size:clamp(.52rem,.75vw,.63rem);color:var(--dim);flex-wrap:wrap;
}
.hero-meta b{color:var(--neon)}

/* ════════════════════════════════════════
   EVENT TABS
════════════════════════════════════════ */
.tscroll{overflow-x:auto;border-bottom:1px solid var(--border);
  scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tscroll::-webkit-scrollbar{display:none}
.trow{display:flex;min-width:max-content}
.etab{
  background:transparent;border:none;border-bottom:2px solid transparent;
  padding:clamp(.45rem,.8vw,.75rem) clamp(.7rem,1.5vw,1.2rem);
  font-family:var(--fm);font-size:clamp(.55rem,.68vw,.68rem);letter-spacing:.1em;
  color:var(--dim);cursor:pointer;display:flex;flex-direction:column;align-items:center;
  gap:.2rem;white-space:nowrap;transition:color .2s,border-color .2s;
}
.etab.active{color:var(--neon);border-bottom-color:var(--neon)}
.etab:hover:not(.active){color:var(--text)}
.etab.dis{opacity:.2;pointer-events:none;filter:grayscale(1)}
.eico{font-size:clamp(.85rem,1.1vw,1.15rem)}

/* ════════════════════════════════════════
   GRADE / CATEGORY TABS
════════════════════════════════════════ */
.cscroll{overflow-x:auto;background:rgba(0,0,0,.2);scrollbar-width:none;-webkit-overflow-scrolling:touch}
.cscroll::-webkit-scrollbar{display:none}
.crow{display:flex;min-width:max-content;padding:0 .5rem}
.ctab{
  background:transparent;border:none;border-bottom:2px solid transparent;
  padding:clamp(.38rem,.6vw,.55rem) clamp(.65rem,1.2vw,1rem);
  font-family:var(--fm);font-size:clamp(.55rem,.65vw,.63rem);letter-spacing:.12em;
  color:var(--dim);cursor:pointer;white-space:nowrap;transition:color .2s,border-color .2s;
}
.ctab.active{color:var(--acid);border-bottom-color:var(--acid)}

/* ════════════════════════════════════════
   VIEW BAR
════════════════════════════════════════ */
.vbar{display:flex;gap:.4rem;padding:.55rem 1rem;border-bottom:1px solid var(--border);flex-wrap:wrap}
.vbtn{
  background:transparent;border:1px solid var(--border);
  padding:.28rem clamp(.5rem,1vw,.75rem);font-family:var(--fm);
  font-size:clamp(.52rem,.62vw,.6rem);letter-spacing:.1em;color:var(--dim);
  cursor:pointer;transition:all .2s;
}
.vbtn.active{border-color:var(--neon);color:var(--neon);background:rgba(0,245,255,.07)}

/* ════════════════════════════════════════
   MAIN CONTENT
════════════════════════════════════════ */
.main{padding:clamp(.6rem,1.5vw,1rem);flex:1}

/* ════════════════════════════════════════
   LOADING / ERROR / EMPTY
════════════════════════════════════════ */
.loader{display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:4rem 1rem;gap:1rem}
.spin{width:36px;height:36px;border:3px solid var(--border);
  border-top-color:var(--neon);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.ltxt{font-size:.66rem;letter-spacing:.2em;color:var(--dim)}
.errbox{
  background:rgba(255,68,85,.07);border:1px solid rgba(255,68,85,.3);
  padding:1.4rem;margin:1.5rem auto;max-width:460px;text-align:center;line-height:1.9;
}
.errbox h3{color:var(--red);font-size:.82rem;margin-bottom:.5rem;letter-spacing:.1em}
.errbox p{font-size:.66rem;color:var(--dim)}
.empty{text-align:center;padding:3rem 1rem;color:var(--dim);font-size:.7rem;letter-spacing:.1em}
.na{text-align:center;padding:2.5rem 1rem;color:var(--dim);font-size:.68rem;letter-spacing:.15em}

/* ════════════════════════════════════════
   BRACKET INFO BANNER
════════════════════════════════════════ */
.binfo{
  background:rgba(0,245,255,.04);border:1px solid rgba(0,245,255,.12);
  padding:.65rem 1rem;margin-bottom:1rem;
  display:flex;gap:clamp(.6rem,2vw,1.8rem);flex-wrap:wrap;font-size:clamp(.6rem,.75vw,.65rem);
}
.binfo span b{color:var(--neon)}

/* ════════════════════════════════════════
   QUALIFIER TABLE
════════════════════════════════════════ */
.qtbl{width:100%;border-collapse:collapse;font-size:clamp(.62rem,.78vw,.73rem)}
.qtbl th{
  padding:.5rem .7rem;text-align:left;border-bottom:1px solid var(--border);
  color:var(--dim);font-size:.56rem;letter-spacing:.15em;
}
.qtbl td{padding:.48rem .7rem;border-bottom:1px solid var(--border2)}
.qrow.q{background:rgba(170,255,0,.03)}.qrow.q td:first-child{color:var(--acid)}
.qdiv td{
  background:rgba(255,68,85,.05);color:var(--red);font-size:.56rem;
  letter-spacing:.15em;padding:.32rem .7rem;border-top:1px solid rgba(255,68,85,.18);
}
.rnk{color:var(--dim);font-weight:bold}.rnk.t{color:var(--acid)}
.bdg{display:inline-block;font-size:.5rem;padding:.1rem .32rem;letter-spacing:.07em;border-radius:2px}
.bq{background:rgba(170,255,0,.12);border:1px solid rgba(170,255,0,.3);color:var(--acid)}
.be{background:rgba(255,68,85,.1);border:1px solid rgba(255,68,85,.25);color:var(--red)}
.bp{background:rgba(200,232,255,.04);border:1px solid rgba(200,232,255,.1);color:var(--dim)}

/* ════════════════════════════════════════
   BRACKET SCROLL + COLUMNS
════════════════════════════════════════ */
.bwrap{overflow-x:auto;padding:.5rem 0;-webkit-overflow-scrolling:touch}
.bracket{display:flex;align-items:flex-start;min-width:max-content;padding:.2rem .4rem}
.bcol{display:flex;flex-direction:column;padding:0 .35rem;
  min-width:clamp(148px,17vw,205px)}
.bchdr{
  font-size:.56rem;letter-spacing:.15em;padding:.32rem .15rem;
  margin-bottom:.65rem;border-bottom:1px solid;
}
.bchdr.qual{color:var(--neon);border-color:rgba(0,245,255,.3)}
.bchdr.r32{color:var(--pink);border-color:rgba(255,0,204,.3)}
.bchdr.r16{color:var(--orange);border-color:rgba(255,170,0,.3)}
.bchdr.qf{color:#ffd000;border-color:rgba(255,208,0,.3)}
.bchdr.sf{color:#ff6200;border-color:rgba(255,98,0,.3)}
.bchdr.fn{color:var(--acid);border-color:rgba(170,255,0,.3)}

/* match card */
.mc{background:var(--panel);border:1px solid var(--border);margin-bottom:.45rem;
  border-radius:3px;overflow:hidden;transition:border-color .2s}
.mcid{font-size:.5rem;color:var(--dim);padding:.26rem .48rem;
  background:rgba(0,0,0,.22);letter-spacing:.07em}
.mct{
  display:flex;align-items:center;justify-content:space-between;
  padding:.42rem .48rem;border-top:1px solid var(--border2);gap:.3rem;
}
.mct.win{background:rgba(170,255,0,.06)}
.mct.lose{opacity:.38}
.mct.bye{background:rgba(0,245,255,.05);opacity:.72}
.mcn{font-size:clamp(.58rem,.72vw,.7rem);flex:1;word-break:break-word;min-width:0}
.mcn.tbd{color:var(--dim);font-style:italic}
.mcr{font-size:.48rem;padding:.1rem .3rem;border-radius:2px;font-weight:bold;flex-shrink:0}
.mcr.win{background:rgba(170,255,0,.2);color:var(--acid)}
.mcr.lose{background:rgba(255,68,85,.15);color:var(--red)}
.mcr.bye{background:rgba(0,245,255,.12);color:var(--neon)}

/* ════════════════════════════════════════
   WINNER PODIUM
════════════════════════════════════════ */
.podium{
  display:flex;gap:clamp(.8rem,2.5vw,1.5rem);
  justify-content:center;padding:clamp(1rem,4vw,2.5rem) 1rem;flex-wrap:wrap;
}
.pod{text-align:center;padding:clamp(.9rem,2.5vw,2rem) clamp(.8rem,2vw,1.5rem);
  width:clamp(130px,28vw,210px)}
.pod.gld{
  background:rgba(255,204,0,.06);border:1px solid rgba(255,204,0,.32);
  box-shadow:0 0 28px rgba(255,204,0,.09);
}
.pod.slv{background:rgba(184,200,216,.06);border:1px solid rgba(184,200,216,.28)}
.pmed{font-size:clamp(1.6rem,4vw,2.7rem);margin-bottom:.4rem}
.ppl{font-size:.56rem;letter-spacing:.2em;opacity:.6;margin-bottom:.3rem}
.pnm{font-family:var(--fd);font-size:clamp(.65rem,1.4vw,.88rem);
  font-weight:700;color:#fff;word-break:break-word}
.pod.gld .pnm{color:var(--gold)}.pod.slv .pnm{color:var(--silver)}

/* ════════════════════════════════════════
   ADMIN PANEL
════════════════════════════════════════ */
.adhdr{text-align:center;padding:1rem 1rem .35rem}
.adhdr h2{font-family:var(--fd);font-size:clamp(.85rem,1.8vw,1.15rem);
  color:var(--orange);letter-spacing:.15em}
.stbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:.3rem 1rem;background:rgba(0,0,0,.28);
  font-size:clamp(.55rem,.7vw,.6rem);border-bottom:1px solid var(--border);
  flex-wrap:wrap;gap:.3rem;
}
.sok{color:var(--acid)}.serr{color:var(--red)}.ssav{color:var(--neon)}
.brel{background:transparent;border:1px solid var(--border);color:var(--neon);
  font-family:var(--fm);font-size:.56rem;padding:.16rem .5rem;cursor:pointer;letter-spacing:.07em}

/* round sections */
.rsec{margin-bottom:1.4rem}
.rhdr{
  font-size:clamp(.58rem,.72vw,.68rem);letter-spacing:.18em;
  padding:.42rem .8rem;border-left:3px solid;margin-bottom:.65rem;
  display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.3rem;
}
.rhdr.qual{border-color:var(--neon);color:var(--neon);background:rgba(0,245,255,.04)}
.rhdr.r32{border-color:var(--pink);color:var(--pink);background:rgba(255,0,204,.04)}
.rhdr.r16{border-color:var(--orange);color:var(--orange);background:rgba(255,170,0,.04)}
.rhdr.qf{border-color:#ffd000;color:#ffd000;background:rgba(255,208,0,.04)}
.rhdr.sf{border-color:#ff6200;color:#ff6200;background:rgba(255,98,0,.04)}
.rhdr.fn{border-color:var(--acid);color:var(--acid);background:rgba(170,255,0,.04)}
.rhr{font-size:.55rem;opacity:.6}

/* match grid */
.mgrid{display:grid;
  grid-template-columns:repeat(auto-fill,minmax(clamp(230px,28vw,295px),1fr));gap:.45rem}
.amc{background:var(--panel);border:1px solid var(--border);border-radius:3px;overflow:hidden}
.amc.done{border-color:rgba(170,255,0,.22);background:rgba(170,255,0,.012)}
.amid{font-size:.56rem;color:var(--dim);padding:.28rem .65rem;
  background:rgba(0,0,0,.2);letter-spacing:.07em;
  display:flex;justify-content:space-between;align-items:center}
.dtag{color:var(--acid);font-size:.5rem}
.amr{display:flex;align-items:center;padding:.42rem .65rem;
  border-top:1px solid var(--border2);gap:.4rem;flex-wrap:wrap}
.amr.won{background:rgba(170,255,0,.05)}
.amr.lost{opacity:.48}
.amr.bye{background:rgba(0,245,255,.04)}
.amn{flex:1;font-size:clamp(.65rem,.78vw,.76rem);min-width:70px}
.btns{display:flex;gap:.25rem;flex-shrink:0}
.bw,.bl,.bb{
  border:1px solid;font-family:var(--fm);font-size:clamp(.55rem,.65vw,.6rem);
  padding:.28rem .5rem;cursor:pointer;letter-spacing:.07em;
  font-weight:bold;transition:background .15s;background:transparent;
}
.bw{border-color:rgba(170,255,0,.4);color:var(--acid)}
.bw:hover,.bw.on{background:rgba(170,255,0,.18)}
.bl{border-color:rgba(255,68,85,.35);color:var(--red)}
.bl:hover,.bl.on{background:rgba(255,68,85,.18)}
.bb{border-color:rgba(0,245,255,.3);color:var(--neon)}
.bb:hover,.bb.on{background:rgba(0,245,255,.14)}
.bw:disabled,.bl:disabled,.bb:disabled{opacity:.28;cursor:not-allowed}

/* qualifier time input */
.qigrid{display:grid;
  grid-template-columns:repeat(auto-fill,minmax(clamp(200px,26vw,260px),1fr));
  gap:.38rem;margin-bottom:1rem}
.qi{display:flex;align-items:center;gap:.45rem;
  background:var(--panel);border:1px solid var(--border);padding:.42rem .65rem}
.qi.top{border-left:2px solid var(--acid)}
.qir{width:20px;font-size:.62rem;color:var(--dim);text-align:center;flex-shrink:0}
.qir.t{color:var(--acid)}
.qin{flex:1;font-size:.68rem;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.qii{background:rgba(0,0,0,.4);border:1px solid var(--border);color:var(--text);
  font-family:var(--fm);font-size:.68rem;padding:.26rem .4rem;
  width:75px;text-align:center;flex-shrink:0}
.qii:focus{outline:none;border-color:var(--neon)}

/* ════════════════════════════════════════
   TOAST
════════════════════════════════════════ */
.toast{
  position:fixed;left:50%;bottom:1rem;z-index:999;
  transform:translateX(-50%) translateY(100px);
  background:var(--panel);border:1px solid var(--border);
  padding:.5rem 1rem;font-size:.66rem;letter-spacing:.07em;
  transition:transform .28s ease;pointer-events:none;
  white-space:nowrap;max-width:88vw;text-align:center;
}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.ok{border-color:rgba(170,255,0,.4);color:var(--acid)}
.toast.err{border-color:rgba(255,68,85,.4);color:var(--red)}

/* ════════════════════════════════════════
   PASSWORD OVERLAY
════════════════════════════════════════ */
.pwov{position:fixed;inset:0;background:rgba(5,10,15,.97);
  z-index:500;display:none;align-items:center;justify-content:center;
  flex-direction:column;padding:1rem}
.pwov.show{display:flex}
.pwbox{background:var(--panel);border:1px solid var(--border);
  padding:clamp(1.2rem,3vw,2rem);width:min(310px,92vw);text-align:center}
.pwtit{font-family:var(--fd);font-size:.92rem;color:var(--orange);letter-spacing:.15em;margin-bottom:.22rem}
.pwsub{font-size:.56rem;color:var(--dim);letter-spacing:.15em;margin-bottom:.18rem}
.pwhint{font-size:.5rem;color:rgba(200,232,255,.18);letter-spacing:.12em;margin-bottom:.9rem}
.pwin{width:100%;background:rgba(0,0,0,.5);border:1px solid var(--border);
  color:var(--text);font-family:var(--fm);font-size:1rem;padding:.6rem;
  text-align:center;letter-spacing:.2em;margin-bottom:.65rem}
.pwin:focus{outline:none;border-color:var(--neon)}
.pwin.shake{animation:sh .38s}
@keyframes sh{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
.pwerr{color:var(--red);font-size:.6rem;height:.85rem;margin-bottom:.38rem}
.pwbtn{width:100%;background:rgba(255,170,0,.11);border:1px solid rgba(255,170,0,.38);
  color:var(--orange);font-family:var(--fm);font-size:.7rem;padding:.62rem;cursor:pointer;letter-spacing:.12em}
.pwcancel{background:transparent;border:none;color:var(--dim);font-family:var(--fm);
  font-size:.6rem;cursor:pointer;margin-top:.4rem;letter-spacing:.1em;display:block;width:100%}

/* ════════════════════════════════════════
   MOBILE BOTTOM NAV (≤ 520px)
════════════════════════════════════════ */
.mobnav{
  display:none;position:fixed;bottom:0;left:0;right:0;height:var(--mobnav-h);
  background:rgba(5,10,15,.98);border-top:1px solid var(--border);
  z-index:100;
}
.mobnav-inner{display:flex;height:100%}
.mtab{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:.18rem;font-family:var(--fm);font-size:.48rem;letter-spacing:.09em;
  color:var(--dim);background:transparent;border:none;cursor:pointer;transition:color .2s;
}
.mtab.active{color:var(--neon)}
.mtico{font-size:1.05rem;line-height:1}

/* ════════════════════════════════════════
   RESPONSIVE — TABLET (481–900px)
════════════════════════════════════════ */
@media(min-width:481px) and (max-width:900px){
  .mgrid{grid-template-columns:repeat(auto-fill,minmax(220px,1fr))}
  .qigrid{grid-template-columns:repeat(auto-fill,minmax(200px,1fr))}
  .bcol{min-width:155px}
  .btns{flex-wrap:wrap}
}

/* ════════════════════════════════════════
   RESPONSIVE — MOBILE (≤ 520px)
════════════════════════════════════════ */
@media(max-width:520px){
  :root{--mobnav-h:56px}
  .wrap{padding-bottom:var(--mobnav-h)}
  .mobnav{display:block}
  .toast{bottom:calc(var(--mobnav-h) + .5rem)}

  .nav{padding:.4rem .7rem}
  .ntitle{font-size:.62rem}
  .hero{padding:1rem .75rem .75rem}
  .hero-h1{font-size:clamp(1.4rem,8vw,2rem)}

  .main{padding:.5rem .5rem}
  .mgrid{grid-template-columns:1fr}
  .qigrid{grid-template-columns:1fr 1fr}
  .bcol{min-width:138px}
  .binfo{font-size:.56rem;gap:.5rem .7rem}
  .amr{padding:.38rem .5rem}
  .bw,.bl,.bb{padding:.26rem .42rem;font-size:.55rem}
  .btns{gap:.2rem}

  /* hide desktop view bar on mobile — using bottom nav instead */
  .vbar{display:none}
}

/* ════════════════════════════════════════
   RESPONSIVE — SMALL MOBILE (≤ 360px)
════════════════════════════════════════ */

/* ════════════════════════════════════════

</nav>
<div class="cbar" id="cbar"></div>

<!-- ════════════════════════════════════
     SCOREBOARD MODE
════════════════════════════════════════ -->
<div id="sbMode">
  <div class="hero">
    <div class="hero-eye">&#9670; KOS PREMIER LEAGUE 2026 &#9670;</div>
    <h1 class="hero-h1">LIVE <span>SCOREBOARD</span></h1>
    <div class="hero-meta">
      <span>&#128197;&nbsp;Updated:&nbsp;<b id="lastUp">—</b></span>
      <span>&#8987;&nbsp;Refresh in:&nbsp;<b id="refIn">10s</b></span>

  <!-- Event tabs -->
  <div class="tscroll">
    <div class="trow" id="evTabs">
      <button class="etab active" data-ev="Robo Race" onclick="sbEv('Robo Race',this)">
        <span class="eico">&#127950;</span>ROBO RACE</button>

<!-- ════════════════════════════════════
     ADMIN MODE

  <!-- Admin event tabs -->

    <div class="trow" id="admEvTabs">
      <button class="etab active" data-ev="Robo Race" onclick="admEv('Robo Race',this)">
        <span class="eico">&#127950;</span>ROBO RACE</button>
      <button class="etab" data-ev="Robo Soccer" onclick="admEv('Robo Soccer',this)">
        <span class="eico">&#9917;</span>ROBO SOCCER</button>
      <button class="etab" data-ev="Robo Kabaddi" onclick="admEv('Robo Kabaddi',this)">
        <span class="eico">&#129354;</span>ROBO KABADDI</button>
      <button class="etab" data-ev="Robo Sumo" onclick="admEv('Robo Sumo',this)">
        <span class="eico">&#129354;</span>ROBO SUMO</button>
      <button class="etab" data-ev="All Terrain" onclick="admEv('All Terrain',this)">
        <span class="eico">&#127956;</span>ALL TERRAIN</button>
      <button class="etab" data-ev="Logic Robots" onclick="admEv('Logic Robots',this)">

<!-- ── MOBILE BOTTOM NAV ──────────────── -->
<nav class="mobnav" id="mobnav">
  <div class="mobnav-inner">
    <button class="mtab active" id="mbb" onclick="sbView('bracket')">
      <span class="mtico">&#9889;</span>BRACKET</button>
    <button class="mtab" id="mbq" onclick="sbView('qual')" style="display:none">
      <span class="mtico">&#127950;</span>QUALIFIER</button>

      <span class="mtico">&#127942;</span>WINNER</button>
  </div>
</nav>

</div><!-- end .wrap -->

<script>

const SCRIPT_URL='https://script.google.com/macros/s/AKfycbzKw9FfKLC6xfsI9r7bH1qMHgi2mfWDlQM7gbOqsfJVmhHotJogS-FceJiRDLIoQ-0Dgw/exec';
const PW_MAP={'7-9':'789','4-6':'456','1-3':'123','IM25 3-5':'IM345','IM25 6-9':'IM6789'};
const CAT_EVENTS={'7-9':['Robo Race','Robo Soccer','Robo Kabaddi','Robo Sumo','All Terrain','Logic Robots'],'4-6':['Robo Race','Robo Kabaddi','Robo Sumo','All Terrain'],'1-3':['Robo Race','Robo Sumo'],'IM25 3-5':['Robo Race','Robo Soccer','Robo Kabaddi','Robo Sumo','All Terrain'],'IM25 6-9':['Robo Race','Robo Soccer','Robo Kabaddi','Robo Sumo','All Terrain']};
const ROUNDS_RACE=['R32','R16','QF','SF','Final'];
const ROUNDS_STD=['Qual','R32','R16','QF','SF','Final'];
const RLABEL={Qual:'QUALIFIERS',R32:'ROUND OF 32',R16:'ROUND OF 16',QF:'QUARTER FINALS',SF:'SEMI FINALS',Final:'FINAL'};
const RCLS={Qual:'qual',R32:'r32',R16:'r16',QF:'qf',SF:'sf',Final:'fn'};

let D={},admMode=false,admCat=null,curEv='Robo Race',curCat='7-9',curView='bracket',curAdmEv='Robo Race',cd=10,tmr=null;

function gasRead(t){return fetch(SCRIPT_URL+'?type='+t+'&nc='+Date.now()).then(r=>{if(!r.ok)throw 0;return r.json();});}
function gasWrite(p){const q=Object.entries(p).map(([k,v])=>encodeURIComponent(k)+'='+encodeURIComponent(v)).join('&');return fetch(SCRIPT_URL+'?'+q,{method:'GET',mode:'no-cors'}).then(()=>({status:'ok'})).catch(()=>({status:'ok'}));}

function fetchScores(){
  gasRead('scoreboard').then(j=>{
    if(j.status==='ok'){D=j.data;document.getElementById('lastUp').textContent=j.updated||'—';renderSb();}
    else showErr('Script error: '+(j.message||'?'));
  }).catch(()=>showErr('Cannot connect. Deploy Apps Script with <b>Anyone</b> access + Authorize.'));
}
function loadAdmin(){
  setSt('&#9899; Loading...','s');
  gasRead('admin_get').then(j=>{
    if(j.status==='ok'){D=j.data;document.getElementById('admLoaded').textContent='Loaded '+new Date().toLocaleTimeString('en-IN');renderAdmin();setSt('&#10003; Loaded','ok');}
    else setSt('&#9888; '+(j.message||'Error'),'e');
  }).catch(()=>setSt('&#9888; Cannot connect','e'));
}
function showErr(m){document.getElementById('sbc').innerHTML=`<div class="errbox"><h3>&#9888; ERROR</h3><p>${m}</p></div>`;}

function openPw(){document.getElementById('pwov').classList.add('show');document.getElementById('pwin').focus();}
function closePw(){document.getElementById('pwov').classList.remove('show');document.getElementById('pwin').value='';document.getElementById('pwerr').textContent='';}
function checkPw(){
  const v=document.getElementById('pwin').value.trim();
  const m=Object.entries(PW_MAP).find(([c,p])=>p===v);
  if(m){admCat=m[0];closePw();enterAdmin();}
  else{const i=document.getElementById('pwin');document.getElementById('pwerr').textContent='&#9888; Wrong password';i.value='';i.classList.remove('shake');void i.offsetWidth;i.classList.add('shake');i.focus();}
}

function enterAdmin(){
  admMode=true;clearInterval(tmr);
  $('sbMode').style.display='none';$('admMode').style.display='block';
  $('mobnav').style.display='none';$('plive').style.display='none';
  $('padmin').style.display='flex';$('gchip').textContent=admCat;
  $('bopen').style.display='none';$('bexit').style.display='flex';$('cbar').style.display='none';
  const al=CAT_EVENTS[admCat]||[];curAdmEv=al[0];
  document.querySelectorAll('#admEvTabs .etab').forEach(b=>{b.style.display=al.includes(b.dataset.ev)?'':'none';b.classList.toggle('active',b.dataset.ev===curAdmEv);});
  loadAdmin();toast('&#9881; Admin: Grade '+admCat,'ok');
}
function exitAdmin(){
  admMode=false;admCat=null;
  $('sbMode').style.display='block';$('admMode').style.display='none';
  $('mobnav').style.display='flex';$('plive').style.display='flex';
  $('padmin').style.display='none';$('bopen').style.display='flex';
  $('bexit').style.display='none';$('cbar').style.display='block';
  document.querySelectorAll('#admEvTabs .etab').forEach(b=>b.style.display='');
  startTimer();toast('&#10003; Back to scoreboard','ok');
}
function admEv(ev,btn){curAdmEv=ev;document.querySelectorAll('#admEvTabs .etab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');renderAdmin();}

function sbEv(ev,btn){curEv=ev;document.querySelectorAll('#evTabs .etab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');updVbar();renderSb();}
function sbCat(cat,btn){
  curCat=cat;document.querySelectorAll('#catTabs .ctab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
  const al=CAT_EVENTS[cat]||[];if(!al.includes(curEv)){curEv=al[0];document.querySelectorAll('#evTabs .etab').forEach(b=>b.classList.toggle('active',b.dataset.ev===curEv));}
  updEvTabs(cat);updVbar();renderSb();
}
function sbView(v){curView=v;updVbar();renderSb();}
function updEvTabs(cat){const al=CAT_EVENTS[cat]||[];document.querySelectorAll('#evTabs .etab').forEach(b=>b.classList.toggle('dis',!al.includes(b.dataset.ev)));}
function updVbar(){
  const ir=curEv==='Robo Race';
  $('vbq').style.display=ir?'':'none';$('mbq').style.display=ir?'flex':'none';
  if(!ir&&curView==='qual')curView='bracket';
  $('vbq').classList.toggle('active',curView==='qual');
  $('vbb').classList.toggle('active',curView==='bracket');
  $('vbw').classList.toggle('active',curView==='winner');
  $('mbb').classList.toggle('active',curView==='bracket');
  $('mbw').classList.toggle('active',curView==='winner');
  $('mbq').classList.toggle('active',curView==='qual');
}

function pow2(n){let p=1;while(p*2<=n)p*=2;return p;}

function renderSb(){
  const ev=curEv,cat=curCat;
  if(!(CAT_EVENTS[cat]||[]).includes(ev)){$('sbc').innerHTML='<div class="na">&#128683; Not available for this grade</div>';return;}
  const d=(D[ev]&&D[ev][cat])||{teams:[],matches:{},isRace:ev==='Robo Race'};
  if(curView==='qual'&&ev==='Robo Race') $('sbc').innerHTML=buildQual(d);
  else if(curView==='winner') $('sbc').innerHTML=buildWin(d);
  else $('sbc').innerHTML=buildBrk(d);
}

function buildQual(d){
  const ts=d.teams||[];if(!ts.length)return '<div class="empty">No qualifier data yet</div>';
  const tot=ts.length,tgt=pow2(tot),pi=(tot-tgt)*2,by=tot-pi;
  let h=`<div class="binfo"><span>Teams: <b>${tot}</b></span><span>Target: <b>${tgt}</b></span><span>Play Quals: <b style="color:var(--orange)">${pi}</b> (${pi/2} matches)</span><span>BYE: <b style="color:var(--purple)">${by}</b></span></div>`;
  h+=`<div style="overflow-x:auto"><table class="qtbl"><thead><tr><th>#</th><th>TEAM</th><th>TIME</th><th>STATUS</th></tr></thead><tbody>`;
  ts.forEach((t,i)=>{
    const r=i+1,top=r<=tgt;
    if(r===tgt+1)h+=`<tr class="qdiv"><td colspan="4">&#9660; DID NOT QUALIFY</td></tr>`;
    const b=t.time?(top?'<span class="bdg bq">&#10003; QUALIFIED</span>':'<span class="bdg be">&#10005; OUT</span>'):'<span class="bdg bp">PENDING</span>';
    h+=`<tr class="qrow${top?' q':''}"><td class="rnk${top?' t':''}">${r}</td><td>${t.name}</td><td>${t.time||'—'}</td><td>${b}</td></tr>`;
  });
  h+='</tbody></table></div>';return h;
}

function buildBrk(d){
  const rounds=d.isRace?ROUNDS_RACE:ROUNDS_STD,matches=d.matches||{};
  const active=rounds.filter(r=>matches[r]&&Object.keys(matches[r]).length);
  if(!active.length)return '<div class="empty">No bracket data yet</div>';
  let h='<div class="bwrap"><div class="bracket">';
  active.forEach(r=>{
    const cls=RCLS[r]||'';
    h+=`<div class="bcol"><div class="bchdr ${cls}">${RLABEL[r]||r}</div>`;
    // Sort match IDs numerically: QF1,QF2,QF3 not QF1,QF10,QF2
    const sortedMids=Object.keys(matches[r]).sort((a,b)=>{
      const na=parseInt(a.replace(/[^\d]/g,''))||0;
      const nb=parseInt(b.replace(/[^\d]/g,''))||0;
      return na-nb;
    });
    sortedMids.forEach(mid=>{const ts=matches[r][mid];
      const t1=ts[0]||{name:'TBD',result:''},t2=ts[1]||{name:'TBD',result:''};
      h+=`<div class="mc"><div class="mcid">${mid}</div>`;
      [t1,t2].forEach(t=>{const w=t.result==='WIN',l=t.result==='LOSE',by=t.result==='BYE';h+=`<div class="mct${w?' win':l?' lose':by?' bye':''}"><span class="mcn${t.name==='TBD'?' tbd':''}">${t.name}</span>${t.result?`<span class="mcr ${w?'win':l?'lose':by?'bye':''}">${t.result}</span>`:''}</div>`;});
      h+=`</div>`;
    });
    h+=`</div>`;
  });
  h+='</div></div>';return h;
}

function buildWin(d){
  const f=d.matches&&d.matches['Final'];let w=null,ru=null;
  Object.values(f||{}).forEach(ts=>ts.forEach(t=>{if(t.result==='WIN')w=t;else if(t.result==='LOSE')ru=t;}));
  if(!w&&!ru)return '<div class="empty">Final not completed yet</div>';
  let h='<div class="podium">';
  if(w)h+=`<div class="pod gld"><div class="pmed">&#127942;</div><div class="ppl">CHAMPION</div><div class="pnm">${w.name}</div></div>`;
  if(ru)h+=`<div class="pod slv"><div class="pmed">&#129352;</div><div class="ppl">RUNNER-UP</div><div class="pnm">${ru.name}</div></div>`;
  h+='</div>';return h;
}

function renderAdmin(){
  const ev=curAdmEv,cat=admCat;
  const d=(D[ev]&&D[ev][cat])||{teams:[],matches:{},isRace:ev==='Robo Race'};
  const ir=d.isRace||ev==='Robo Race',rounds=ir?ROUNDS_RACE:ROUNDS_STD;
  let h='';
  if(ir){
    const tot=(d.teams||[]).length,tgt=tot?pow2(tot):32;
    h+=`<div class="rsec"><div class="rhdr qual">&#127950; QUALIFIER — TIME ENTRY<span class="rhr">Top ${tgt} advance to R32</span></div><div class="qigrid">`;
    (d.teams||[]).forEach((t,i)=>{const top=i<tgt&&t.time;h+=`<div class="qi${top?' top':''}"><span class="qir${top?' t':''}">${i+1}</span><span class="qin" title="${t.name}">${t.name}</span><input class="qii" value="${t.time||''}" placeholder="mm:ss.xx" onchange="saveTime('${esc(ev)}','${cat}','${esc(t.name)}',this.value)" onblur="saveTime('${esc(ev)}','${cat}','${esc(t.name)}',this.value)"></div>`;});
    if(!(d.teams||[]).length)h+=`<div class="empty">No teams</div>`;
    h+=`</div></div>`;
  }
  rounds.forEach(r=>{
    const mg=((d.matches||{})[r])||{},mids=Object.keys(mg);if(!mids.length)return;
    const cls=RCLS[r]||'',done=mids.filter(m=>mg[m].some(t=>t.result==='WIN'||t.result==='BYE')).length;
    h+=`<div class="rsec"><div class="rhdr ${cls}">${RLABEL[r]||r}<span class="rhr">${done}/${mids.length} done</span></div><div class="mgrid">`;
    // Sort match IDs numerically
    const sortedMids2=mids.sort((a,b)=>{
      const na=parseInt(a.replace(/[^\d]/g,''))||0;
      const nb=parseInt(b.replace(/[^\d]/g,''))||0;
      return na-nb;
    });
    sortedMids2.forEach(mid=>{
      const ts=mg[mid],isDone=ts.some(t=>t.result==='WIN'||t.result==='BYE');
      h+=`<div class="amc${isDone?' done':''}"><div class="amid">${mid}${isDone?' <span class="dtag">&#10003;</span>':''}</div>`;
      ts.forEach(t=>{const w=t.result==='WIN',l=t.result==='LOSE',b=t.result==='BYE';h+=`<div class="amr${w?' won':l?' lost':b?' bye':''}"><span class="amn">${t.name}</span><div class="btns"><button class="bw${w?' on':''}" onclick="setRes('${esc(ev)}','${cat}','${esc(t.name)}','${r}','WIN','${mid}')" ${isDone?'disabled':''}>WIN</button><button class="bl${l?' on':''}" onclick="setRes('${esc(ev)}','${cat}','${esc(t.name)}','${r}','LOSE','${mid}')" ${isDone?'disabled':''}>LOSE</button><button class="bb${b?' on':''}" onclick="setRes('${esc(ev)}','${cat}','${esc(t.name)}','${r}','BYE','${mid}')" ${isDone?'disabled':''}>BYE</button></div></div>`;});
      h+=`</div>`;
    });
    h+=`</div></div>`;
  });
  if(!h)h='<div class="empty">No data. Check sheet tab names and headers.</div>';
  $('admc').innerHTML=h;
}

function setRes(ev,cat,team,round,result,mid){
  setSt('&#9899; Saving...','s');
  gasWrite({type:'admin_set',event:ev,cat,team,round,result}).then(()=>{
    toast('&#10003; '+team+' → '+result,'ok');setSt('&#10003; Saved','ok');
    const d=D[ev]&&D[ev][cat];
    if(d){
      (d.teams||[]).forEach(t=>{if(t.name===team)t[round+'_result']=result;});
      const grp=((d.matches||{})[round]||{})[mid]||[];
      grp.forEach(t=>{if(t.name!==team){const o=(result==='WIN'||result==='BYE')?'LOSE':'WIN';t.result=o;(d.teams||[]).forEach(tt=>{if(tt.name===t.name)tt[round+'_result']=o;});gasWrite({type:'admin_set',event:ev,cat,team:t.name,round,result:o});}});
      rebuildM(ev,cat);renderAdmin();
    }
  });
}
function saveTime(ev,cat,team,time){if(!time)return;gasWrite({type:'admin_set_time',event:ev,cat,team,time});}
function rebuildM(ev,cat){
  const d=D[ev]&&D[ev][cat];if(!d)return;
  const ir=d.isRace||ev==='Robo Race',rounds=ir?ROUNDS_RACE:ROUNDS_STD,matches={};
  rounds.forEach(r=>{const g={};(d.teams||[]).forEach(t=>{const m=t[r+'_match'];if(!m)return;if(!g[m])g[m]=[];if(!g[m].some(x=>x.name===t.name))g[m].push({name:t.name,result:t[r+'_result']||'',time:t.time||''});});matches[r]=g;});
  d.matches=matches;
}

function startTimer(){
  clearInterval(tmr);cd=10;
  tmr=setInterval(()=>{cd--;$('refIn').textContent=cd+'s';$('cbar').style.width=(cd/10*100)+'%';if(cd<=0){cd=10;if(!admMode)fetchScores();}},1000);
}
function toast(m,t){const e=$('toast');e.innerHTML=m;e.className='toast '+(t||'');e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2500);}
function setSt(m,t){const e=$('saveSt');e.innerHTML=m;e.className=t==='ok'?'sok':t==='e'?'serr':t==='s'?'ssav':'';}
function esc(s){return String(s).replace(/'/g,"\\'");}
function $(id){return document.getElementById(id);}

// Particles
(function(){const c=$('pts');for(let i=0;i<20;i++){const p=document.createElement('div');p.className='pt';p.style.cssText=`left:${Math.random()*100}%;animation-duration:${9+Math.random()*14}s;animation-delay:${Math.random()*12}s`;c.appendChild(p);}})();

updEvTabs(curCat);updVbar();fetchScores();startTimer();
